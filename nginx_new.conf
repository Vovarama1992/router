load_module /usr/lib/nginx/modules/ngx_stream_module.so;

user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

stream {

    map $ssl_preread_server_name $backend {
        www.cloudflare.com 127.0.0.1:4443;
        www.microsoft.com  127.0.0.1:4443;
        www.apple.com      127.0.0.1:4443;
        www.amazon.com     127.0.0.1:4443;
        default            127.0.0.1:8443;
    }

    server {
        listen 443 reuseport;
        proxy_pass $backend;
        ssl_preread on;
    }
}

http {

    server {
        listen 80;
        server_name basikvpn.ru;
        return 301 https://$host$request_uri;
    }

    server {
        listen 8443 ssl;
        server_name basikvpn.ru;

        ssl_certificate     /etc/letsencrypt/live/basikvpn.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/basikvpn.ru/privkey.pem;

        location / {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}